            // === CÁC BIẾN & HÀM THỐNG KÊ QUẢN LÝ THIỂU SỐ ===
            const totalExams = quizHistory.length;
            const passCount = quizHistory.filter(h => h.passed).length;
            const passRate = totalExams > 0 ? Math.round((passCount / totalExams) * 100) : 0;
            const averageScore = totalExams > 0 ? Math.round(quizHistory.reduce((sum, h) => sum + h.score, 0) / totalExams) : 0;
            const filteredHistory = quizHistory.filter(h => h.name.toLowerCase().includes(historySearchQuery.toLowerCase()));

            const handleDeleteHistory = (id) => {

            };

            // Cleanup TTS on unmount
            useEffect(() => {
                return () => {
                    if (window.speechSynthesis) {
                        window.speechSynthesis.cancel();
                    }
                };
            }, []);

            const splitSpeechText = (text) => {
                const cleanText = (text || '').replace(/\s+/g, ' ').trim();
                if (!cleanText) return [];
                const sentences = cleanText.match(/[^.!?。！？]+[.!?。！？]*/g) || [cleanText];
                const chunks = [];
                let current = '';
                sentences.forEach(sentence => {
                    const trimmed = sentence.trim();
                    if (!trimmed) return;
                    if ((current + ' ' + trimmed).trim().length > 260 && current) {
                        chunks.push(current.trim());
                        current = trimmed;
                    } else {
                        current = `${current} ${trimmed}`.trim();
                    }
                });
                if (current) chunks.push(current.trim());
                return chunks;
            };

            const speakSpeechChunk = (sectionId) => {
                const chunks = speechChunksRef.current;
                const index = speechIndexRef.current;
                if (!window.speechSynthesis || !chunks[index]) {
                    setSpeakingSection(null);
                    setIsSpeechPaused(false);
                    return;
                }

                const utterance = new SpeechSynthesisUtterance(chunks[index]);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.92;
                utterance.pitch = 1;

                utterance.onend = () => {
                    if (speechIndexRef.current < speechChunksRef.current.length - 1) {
                        speechIndexRef.current += 1;
                        setTimeout(() => speakSpeechChunk(sectionId), 120);
                    } else {
                        setSpeakingSection(null);
                        setIsSpeechPaused(false);
                        speechChunksRef.current = [];
                        speechIndexRef.current = 0;
                    }
                };

                utterance.onerror = () => {
                    setSpeakingSection(null);
                    setIsSpeechPaused(false);
                    speechChunksRef.current = [];
                    speechIndexRef.current = 0;
                };

                window.speechSynthesis.speak(utterance);
            };

            const handleToggleSpeech = (sectionId, textToSpeak) => {
                if (!window.speechSynthesis) {
                    alert("Trình duyệt của bạn không hỗ trợ tính năng phát sách nói này.");
                    return;
                }

                if (speakingSection === sectionId) {
                    if (isSpeechPaused) {
                        window.speechSynthesis.resume();
                        setIsSpeechPaused(false);
                    } else {
                        window.speechSynthesis.pause();
                        setIsSpeechPaused(true);
                    }
                    return;
                }

                window.speechSynthesis.cancel();
                speechChunksRef.current = splitSpeechText(textToSpeak);
                speechIndexRef.current = 0;

                if (speechChunksRef.current.length === 0) {
                    alert("Bài nghe này chưa có nội dung.");
                    return;
                }

                setSpeakingSection(sectionId);
                setIsSpeechPaused(false);
                setTimeout(() => speakSpeechChunk(sectionId), 80);
            };

            const handleStopSpeech = () => {

                setSearchQuery(query);

                if (query.trim().length > 0) {
                    const cleanQuery = removeAccents(query);
                    const queryWords = cleanQuery.split(/\s+/).filter(w => w.length > 0);

                    const scoredItems = SEARCH_INDEX.map(item => {
                        const targetStr = removeAccents(item.title) + ' ' + removeAccents(item.keywords);
                        let matchCount = 0;
                        queryWords.forEach(word => { if (targetStr.includes(word)) matchCount++; });
                        return { ...item, score: queryWords.length > 0 ? (matchCount / queryWords.length) : 0 };
                    });

                    const results = scoredItems.filter(item => item.score > 0.35 || (queryWords.length === 1 && item.score > 0)).sort((a, b) => b.score - a.score);
                    setSearchResults(results);
                    setIsSearchOpen(true);
                } else {
                    setSearchResults([]);
                    setIsSearchOpen(false);
                }
            };

                    score: score,
                    date: vietnamTime,

                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /></svg>
                                    ) : (
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 9v6m4-6v6" /></svg>
                                    )}
                                </button>
                                <button 
                                    onClick={handleStopSpeech}
                                    className="p-2 rounded-full bg-red-950 hover:bg-red-900 text-red-400 transition-colors"
                                    title="Dừng phát"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white border-t border-slate-200/50 py-4 mt-auto text-center text-[10px] text-slate-400">
                        &copy; {new Date().getFullYear()} Ơ Bistro - Chi nhánh Thống Nhất, Thủ Đức. Bảo lưu mọi quyền nội bộ.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
